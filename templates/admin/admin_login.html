<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login — AcadTrack</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-glow" style="background:radial-gradient(circle,rgba(129,140,248,0.05) 0%,transparent 60%)"></div>
  <div class="login-box">
    <div class="login-wordmark" style="color:var(--indigo);">Admin<span>Portal</span></div>
    <div class="login-tagline">AcadTrack Administrative Access</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}<div class="alert alert-{{ cat }}">{{ msg }}</div>{% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('admin_login') }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-full"
        style="background:var(--indigo);color:#fff;font-family:'JetBrains Mono',monospace;
               font-size:0.78rem;padding:0.6rem;border-radius:7px;border:none;cursor:pointer;margin-top:0.5rem;">
        Sign In →
      </button>
    </form>

    <div style="text-align:center;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);">
      <a href="{{ url_for('login') }}" style="font-size:0.7rem;color:var(--text3);text-decoration:none;">
        ← Student Login
      </a>
    </div>
  </div>
</div>
</body>
</html>
