<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AcadTrack</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-glow"></div>
  <div class="login-box">
    <div class="login-wordmark">Acad<span>Track</span></div>
    <div class="login-tagline">Student Performance Analytics Portal</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Roll Number</label>
        <input type="text" name="student_id" placeholder="e.g. 237Z1A0501" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">
        Sign In →
      </button>
    </form>

    <div style="text-align:center;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);">
      <a href="{{ url_for('admin_login') }}" style="font-size:0.7rem;color:var(--text3);text-decoration:none;transition:color 0.2s;"
         onmouseover="this.style.color='var(--cyan)'" onmouseout="this.style.color='var(--text3)'">
        Admin Portal ↗
      </a>
    </div>
  </div>
</div>
</body>
</html>
